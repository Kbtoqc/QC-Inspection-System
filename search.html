<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inspection Search</title>

<style>

body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f4f6f9;
}

.container{
    max-width:750px;
    margin:20px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#1976d2;
}

.row{
    display:flex;
    align-items:center;
    margin-bottom:12px;
    gap:10px;
}

label{
    width:160px;
    font-weight:bold;
    color:#333;
}

input,select{
    flex:1;
    padding:8px;
    font-size:14px;
    border:1px solid #ccc;
    border-radius:6px;
    outline:none;
}

input:focus,select:focus{
    border-color:#1976d2;
}

.dateGroup{
    display:flex;
    flex:1;
    gap:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    font-size:16px;
    cursor:pointer;
    background:#1976d2;
    color:#fff;
    border:none;
    border-radius:6px;
    transition:0.2s;
}

button:hover{
    background:#125aa3;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:#fff;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

th{
    background:#1976d2;
    color:white;
}

tr:nth-child(even){
    background:#f9f9f9;
}

td button{
    width:auto;
    padding:6px 10px;
    margin:2px;
    font-size:13px;
}

td button:first-child{
    background:#4caf50;
}

td button:last-child{
    background:#ff9800;
}

td button:hover{
    opacity:0.85;
}

</style>

</head>

<body>

<div class="container">

<h2>Inspection Search</h2>

<div class="row">
<label>Inspection ID</label>
<input type="text" id="inspectionID">
</div>

<div class="row">
<label>SO No</label>
<input type="text" id="soNo">
</div>

<div class="row">
<label>Inspection Type</label>
<select id="inspectionType">
<option value="">All</option>
</select>
</div>

<div class="row">
<label>Material Type</label>
<select id="materialType">
<option value="">All</option>
</select>
</div>

<div class="row">
<label>Model</label>
<input type="text" id="model">
</div>

<div class="row">
<label>Serial No</label>
<input type="text" id="serialNo">
</div>

<div class="row">
<label>Inspection Date</label>
<div class="dateGroup">
<input type="date" id="dateFrom">
<input type="date" id="dateTo">
</div>
</div>

<button onclick="searchInspection()">SEARCH</button>

<div id="result"></div>

</div>

<script src="js/search.js"></script>

</body>

</html>
