<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inspection Search</title>

<style>

body{
    font-family:Arial,sans-serif;
    margin:20px;
    background:#f5f5f5;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
}

h2{
    text-align:center;
}

.row{
    display:flex;
    align-items:center;
    margin-bottom:12px;
}

label{
    width:170px;
    font-weight:bold;
}

input,select{
    flex:1;
    padding:8px;
    font-size:15px;
}

.dateGroup{
    display:flex;
    flex:1;
    gap:10px;
}

.dateGroup input{
    flex:1;
}

button{

    width:100%;
    padding:12px;
    margin-top:15px;
    font-size:16px;
    cursor:pointer;

}

table{

    width:100%;
    margin-top:20px;
    border-collapse:collapse;

}

th,td{

    border:1px solid #ccc;
    padding:8px;
    text-align:center;

}

th{

    background:#1976d2;
    color:white;

}

</style>

</head>

<body>

<div class="container">

<h2>Inspection Search</h2>

<div class="row">
<label>Inspection ID</label>
<input type="text" id="inspectionID">
</div>

<div class="row">
<label>SO No</label>
<input type="text" id="soNo">
</div>

<div class="row">
<label>Inspection Type</label>

<select id="inspectionType">

<option value="">All</option>
<option>Incoming Inspection</option>
<option>Final Inspection</option>
<option>In-Process Inspection</option>

</select>

</div>

<div class="row">
<label>Material Type</label>
<input type="text" id="materialType">
</div>

<div class="row">
<label>Model</label>
<input type="text" id="model">
</div>

<div class="row">
<label>Serial No</label>
<input type="text" id="serialNo">
</div>

<div class="row">

<label>Inspection Date</label>

<div class="dateGroup">

<input type="date" id="dateFrom">

<input type="date" id="dateTo">

</div>

</div>

<button onclick="searchInspection()">

SEARCH

</button>

<div id="result"></div>

</div>

<script src="js/search.js"></script>

</body>

</html>
