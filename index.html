<!DOCTYPE html>
<html>

<head>
    <title>QC Inspection System</title>
</head>

<body>

<h1>QC Inspection System</h1>

<p>Inspector</p>
<select id="inspector">
    <option>Select Inspector</option>
</select>


<p>Material Type</p>
<select id="material" onchange="loadInspectionItem()">
    <option value="">Select Material</option>
    <option value="Pump">Pump</option>
</select>


<h3>Inspection Items</h3>

<table border="1">

<thead>
<tr>
    <th>No</th>
    <th>Inspection Item</th>
</tr>
</thead>

<tbody id="inspectionBody">
</tbody>

</table>


<p>Serial No</p>
<input type="text" id="serial" placeholder="Enter Serial No">


<br><br>

<button>Start Inspection</button>


<script>


// Inspector API

fetch("https://script.google.com/macros/s/AKfycby-rz0BE7Q04J7CixQ4XRYJMcbo4Wo1WqtvdZ3I7amsrUGgA_kAhLEdiOHGBuJV74tj/exec")

.then(response => response.json())

.then(data => {

    let box = document.getElementById("inspector");

    data.forEach(name => {

        let option = document.createElement("option");
        option.text = name;
        box.add(option);

    });

});




// Inspection Item API

function loadInspectionItem(){

    let material = document.getElementById("material").value;

    let body = document.getElementById("inspectionBody");

    body.innerHTML = "";


    fetch("https://script.google.com/macros/s/AKfycbw9QKqQNuHD5nQdP7MTwDOc5vu4nyMFCgeeHsXnG7dZYxrykaCf2yJv4-ZU36CvYvYU/exec")

    .then(response => response.json())

    .then(data => {


        data.forEach(item => {


            if(item.material == material){


                let row = body.insertRow();


                let cell1 = row.insertCell(0);
                let cell2 = row.insertCell(1);


                cell1.innerHTML = item.itemNo;
                cell2.innerHTML = item.item;


            }


        });


    });


}


</script>


</body>

</html>
