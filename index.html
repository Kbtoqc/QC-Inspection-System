<!DOCTYPE html>
<html>

<head>

<title>QC Inspection System</title>

</head>


<body>


<h1>QC Inspection System</h1>


<p>Inspector</p>

<select id="inspector">

<option>Select Inspector</option>

</select>


<p>Material Type</p>

<select id="material">

<option>Select Material</option>

<option value="Pump">Pump</option>

</select>


<h3>Inspection Items</h3>


<table border="1">

<tr>

<th>No</th>

<th>Inspection Item</th>

</tr>


<tr>

<td>1</td>

<td>Model</td>

</tr>


<tr>

<td>2</td>

<td>Serial No</td>

</tr>


<tr>

<td>3</td>

<td>Name Plate</td>

</tr>


</table>


<p>Serial No</p>

<input type="text" placeholder="Enter Serial No">


<br><br>


<button>
Start Inspection
</button>


<script src="js/inspector.js"></script>


</body>


</html>
