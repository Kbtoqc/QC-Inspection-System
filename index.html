<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>KBTL QC Inspection</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d4af37">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KBTL QC">
  <link rel="apple-touch-icon" href="icon-192.png">
  
</head>

<body>

<h2>KBTL QC Inspection Form</h2>

<br>

<button id="saveInspection">
  Save Inspection
</button>

<div id="afterSave" style="display:none;">

<br>

<b>Save Success</b>

<br><br>

<button id="finishButton">
Finish
</button>

<button id="uploadPhotoButton">
Upload Photo
</button>

</div>

<br>

<div>
  <label>Inspection Date</label>
  <input type="date" id="inspectionDate">
</div>

<br>

<div>
  <label>SO No.</label>
  <input type="text" id="soNo" placeholder="Enter SO No.">
</div>

<br>

<div>
  <label>PO No.</label>
  <input type="text" id="poNo" placeholder="Enter PO No.">
</div>

<br>

<div>
  <label>Inspector</label>
  <select id="inspector">
    <option value="">Select Inspector</option>
  </select>
</div>

<br>

<div>
  <label>Customer</label>
  <select id="customer">
    <option value="">Loading...</option>
  </select>
</div>

<br>

<div>
  <label>Supplier</label>
  <select id="supplier">
    <option value="">Loading...</option>
  </select>
</div>

<br>

<div>
  <label>Inspection Type</label>
  <select id="inspectionType">
    <option value="">Loading...</option>
  </select>
</div>

<br>

<div>
  <label>Material Type</label>
  <select id="material">
    <option value="">Loading...</option>
  </select>
</div>

<br>

<div>
  <label>Model</label>
  <input type="text" id="model" placeholder="Enter Model">
</div>

<br>

<div>
  <label>Serial No.</label>
  <input type="text" id="serialNo" placeholder="Enter Serial No.">
</div>

<br>

<div>
  <label>Inspection Checklist</label>

  <table border="1" id="inspectionTable">

    <thead>
      <tr>
        <th>No.</th>
        <th>Check Point</th>
        <th>Spec</th>
        <th>Check Type</th>
        <th>Result</th>
        <th>Remark</th>
      </tr>
    </thead>

    <tbody id="inspectionBody">
    </tbody>

  </table>

</div>

<br>

<div>

  <label>Final Judgement</label>

  <select id="finalJudgement">
    <option value="">Select</option>
    <option value="Accept">Accept</option>
    <option value="Reject">Reject</option>
    <option value="Hold">Hold</option>
  </select>

</div>

<br>

<div>

  <label>Final Remark</label>
  <br>

  <textarea
    id="finalRemark"
    rows="6"
    cols="80"
    placeholder="Enter final remark"></textarea>

</div>

<br>

<script src="js/inspectionDate.js"></script>
<script src="js/inspector.js"></script>
<script src="js/customer.js"></script>
<script src="js/supplier.js"></script>
<script src="js/inspectionType.js"></script>
<script src="js/material.js"></script>
<script src="js/inspectionItem.js"></script>
<script src="js/validation.js"></script>
<script src="js/saveInspection.js?v=3"></script>

</body>

</html>
