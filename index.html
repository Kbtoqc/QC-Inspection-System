<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KBTL QC Inspection</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1565C0">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="apple-mobile-web-app-title" content="KBTL QC">

<link rel="apple-touch-icon" href="icon-192.png">


<style>

*{

    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:
    "Segoe UI",
    Arial,
    sans-serif;

}


body{

    background:#f1f5f9;
    color:#333;
    padding:12px;

}


.container{

    width:100%;
    max-width:900px;
    margin:auto;

}


/* =========================
   HEADER
========================= */


.app-header{

    background:
    linear-gradient(
    135deg,
    #1565C0,
    #0D47A1
    );

    color:white;

    padding:22px 15px;

    border-radius:18px;

    text-align:center;

    box-shadow:
    0 5px 15px rgba(0,0,0,.18);

    margin-bottom:18px;

}


.app-header h2{

    font-size:24px;
    margin-bottom:5px;

}


.app-header span{

    font-size:14px;
    opacity:.9;

}



/* =========================
   CARD
========================= */


.card{

    background:white;

    border-radius:16px;

    padding:18px;

    margin-bottom:18px;

    box-shadow:

    0 3px 10px rgba(0,0,0,.08);

}



.card-title{

    font-size:18px;

    font-weight:bold;

    color:#1565C0;

    border-bottom:

    2px solid #e3f2fd;

    padding-bottom:10px;

    margin-bottom:15px;

}



/* =========================
   FORM
========================= */


.form-group{

    margin-bottom:15px;

}


label{

    display:block;

    font-size:14px;

    font-weight:600;

    margin-bottom:6px;

    color:#374151;

}



input,
select,
textarea{


    width:100%;

    padding:13px;

    font-size:16px;

    border:

    1px solid #d1d5db;

    border-radius:10px;

    background:white;

}



input:focus,
select:focus,
textarea:focus{


    outline:none;

    border-color:#1565C0;

    box-shadow:

    0 0 0 3px rgba(21,101,192,.15);


}



textarea{

    min-height:120px;

}



/* =========================
   BUTTON
========================= */


button{

    width:100%;

    border:none;

    border-radius:12px;

    padding:16px;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

}



#saveInspection{


    background:#1565C0;

    color:white;

    box-shadow:

    0 4px 10px rgba(21,101,192,.35);


}



#saveInspection:active{

    transform:scale(.98);

}



#finishButton{


    background:#2E7D32;

    color:white;

}



#uploadPhotoButton{


    background:#EF6C00;

    color:white;


}



.action-group{


    display:flex;

    gap:12px;


}



/* =========================
   SAVE RESULT
========================= */


#afterSave{


    display:none;

    background:#E8F5E9;

    border:

    1px solid #A5D6A7;

    border-radius:14px;

    padding:18px;

    margin-top:15px;


}



.save-success{


    text-align:center;

    font-size:20px;

    font-weight:bold;

    color:#2E7D32;

    margin-bottom:15px;


}



/* =========================
   TABLE
========================= */


.table-wrapper{

    overflow-x:auto;

}


table{

    width:100%;

    border-collapse:collapse;

    background:white;

}


th{

    background:#1565C0;

    color:white;

    padding:12px;

    font-size:14px;

    text-align:center;


}


td{

    padding:8px;

    border-bottom:

    1px solid #ddd;

    vertical-align:top;

}


td input,
td select,
td textarea{

    padding:9px;

    font-size:14px;

}



/* =========================
   MOBILE
========================= */


@media(max-width:768px){


body{

    padding:8px;

}



.app-header h2{

    font-size:21px;

}



.card{

    padding:14px;

    border-radius:14px;

}



input,
select,
textarea{

    font-size:16px;

}



/*
 Responsive table
*/

.table-wrapper{

    overflow-x:auto;

}


table{

    min-width:700px;

}



.action-group{

    flex-direction:column;

}



}


/* =========================
   DESKTOP
========================= */


@media(min-width:769px){


.form-grid{

    display:grid;

    grid-template-columns:

    1fr 1fr;

    gap:15px;

}


}


</style>

</head>


<body>


<div class="container">

<div class="app-header">

<h2>
KBTL QC Inspection
</h2>

<span>
Quality Inspection System
</span>

</div>



<!-- =========================
     INSPECTION INFORMATION
========================= -->


<div class="card">


<div class="card-title">

📋 Inspection Information

</div>



<div class="form-grid">



<div class="form-group">

<label>
Inspection Date
</label>

<input 
type="date" 
id="inspectionDate">

</div>



<div class="form-group">

<label>
SO No.
</label>

<input 
type="text" 
id="soNo"
placeholder="Enter SO No.">

</div>



<div class="form-group">

<label>
PO No.
</label>

<input 
type="text" 
id="poNo"
placeholder="Enter PO No.">

</div>




<div class="form-group">

<label>
Inspector
</label>


<select id="inspector">

<option value="">
Select Inspector
</option>


</select>


</div>




<div class="form-group">


<label>
Customer
</label>


<select id="customer">


<option value="">
Loading...
</option>


</select>


</div>




<div class="form-group">


<label>
Supplier
</label>


<select id="supplier">


<option value="">
Loading...
</option>


</select>


</div>




<div class="form-group">


<label>
Inspection Type
</label>


<select id="inspectionType">


<option value="">
Loading...
</option>


</select>


</div>




<div class="form-group">


<label>
Material Type
</label>


<select id="material">


<option value="">
Loading...
</option>


</select>


</div>




<div class="form-group">


<label>
Model
</label>


<input
type="text"
id="model"
placeholder="Enter Model">


</div>





<div class="form-group">


<label>
Serial No.
</label>


<input
type="text"
id="serialNo"
placeholder="Enter Serial No.">


</div>



</div>


</div>


<!-- =========================
     INSPECTION CHECKLIST
========================= -->


<div class="card">


<div class="card-title">

🔍 Inspection Checklist

</div>



<div class="table-wrapper">


<table border="1" id="inspectionTable">


<thead>


<tr>


<th>
No.
</th>


<th>
Check Point
</th>


<th>
Specification
</th>


<th>
Check Type
</th>


<th>
Result
</th>


<th>
Remark
</th>


</tr>


</thead>



<tbody id="inspectionBody">


</tbody>



</table>


</div>


</div>


<!-- =========================
     FINAL RESULT
========================= -->


<div class="card">


<div class="card-title">

✅ Final Result

</div>



<div class="form-group">


<label>
Final Judgement
</label>


<select id="finalJudgement">


<option value="">
Select
</option>


<option value="Accept">
Accept
</option>


<option value="Reject">
Reject
</option>


<option value="Hold">
Hold
</option>


</select>


</div>




<div class="form-group">


<label>
Final Remark
</label>


<textarea

id="finalRemark"

rows="6"

placeholder="Enter final remark">


</textarea>


</div>



</div>





<!-- =========================
     SAVE AREA
========================= -->


<div class="card">


<button id="saveInspection">

💾 Save Inspection

</button>



<div id="afterSave">


<div class="save-success">

✅ Save Success

</div>



<div class="action-group">


<button id="finishButton">

Finish

</button>



<button id="uploadPhotoButton">

Upload Photo

</button>


</div>


</div>


</div>


<!-- =========================
     JAVASCRIPT
========================= -->


<script src="js/inspectionDate.js"></script>

<script src="js/inspector.js"></script>

<script src="js/customer.js"></script>

<script src="js/supplier.js"></script>

<script src="js/inspectionType.js"></script>

<script src="js/material.js"></script>

<script src="js/inspectionItem.js"></script>

<script src="js/validation.js"></script>

<script src="js/saveInspection.js?v=3"></script>




<!-- =========================
     SERVICE WORKER
========================= -->


<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("./sw.js");

}

</script>



</div>


</body>


</html>
