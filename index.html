<!DOCTYPE html>
<html>
<head>
  <title>QC Inspection</title>
</head>

<body>

<h2>QC Inspection Form</h2>

<div>
  <label>Inspection Date</label>
  <input type="date" id="inspectionDate">
</div>

<br>

<div>
  <label>SO No.</label>
  <input type="text" id="soNo" placeholder="Enter SO No.">
</div>

<br>

<div>
  <label>Inspector</label>
  <select id="inspector">
    <option value="">Select inspector</option>
  </select>
</div>
  
<br>
  
<div>
  <label>Customer</label>
  <select id="customer">
    <option value="">Select customer</option>
  </select>
</div>

<br>  

<script src="js/inspectionDate.js"></script>
<script src="js/inspector.js"></script>
<script src="js/customer.js"></script>

</body>
</html>
