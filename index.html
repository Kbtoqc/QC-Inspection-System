<!DOCTYPE html>
<html>

<head>
    <title>QC Inspection System</title>
</head>

<body>

    <h1>QC Inspection System</h1>

    <p>Inspector</p>
    <select id="inspector">
        <option value="">Select Inspector</option>
    </select>


    <p>Material Type</p>
    <select id="material" onchange="loadInspectionItem()">
        <option value="">Select Material</option>
    </select>


    <h3>Inspection Items</h3>

    <table border="1">

        <thead>
            <tr>
                <th>Item No</th>
                <th>Check Point</th>
                <th>Spec</th>
                <th>Check Type</th>
            </tr>
        </thead>

        <tbody id="inspectionBody">
        </tbody>

    </table>


    <p>Serial No</p>
    <input type="text" id="serial" placeholder="Enter Serial No">


    <br><br>

    <button>
        Start Inspection
    </button>


    <script src="js/inspector.js"></script>
    <script src="js/material.js"></script>
    <script src="js/inspectionItem.js"></script>

</body>

</html>
